<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no,viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#121212" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Orbit" />
    <meta name="description" content="Orbit 轨迹 - 一款专为密友圈设计的情感地图手账 + 极简记账数字胶囊" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    
    <title>Orbit 轨迹 - 记录与好友的每一个足迹</title>
    <!-- Repair broken DiceBear avatar URLs cached by service worker -->
    <script>
      document.addEventListener('error', function(e) {
        var img = e.target;
        if (img.tagName === 'IMG' && img.src && img.src.includes('dicebear.com') && img.src.includes(',')) {
          var m = img.src.match(/[?&]seed=([^&,]+)/);
          img.src = 'https://api.dicebear.com/9.x/adventurer/svg?seed=' + (m ? m[1] : 'guest');
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
