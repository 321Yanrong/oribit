<!doctype html>
<html lang="zh-CN" data-theme="light" style="background-color: #ffffff;">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- 关键：在任何 CSS 加载前提前读取主题设置，彻底防止启动闪黑 -->
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem('orbit_settings') || '{}');
        var mode = s.themeMode || 'light';
        var isDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var theme = isDark ? 'dark' : 'light';
        var bg = isDark ? '#121212' : '#ffffff';
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.backgroundColor = bg;
        // 同步写入 meta theme-color，让 iOS 状态栏颜色也正确
        var metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor) metaThemeColor.setAttribute('content', bg);
      } catch (e) { /* 读取失败时保持默认浅色，不影响启动 */ }
    })();
  </script>

  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Orbit" />

  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="shortcut icon" href="/logo.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <title>Orbit 轨迹</title>

  <style>
    /* 关键：在 React/CSS 加载前提供正确的背景色，防止启动闪黑 */
    :root {
      --orbit-bg: #ffffff;
    }

    :root[data-theme='dark'] {
      --orbit-bg: #121212;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--orbit-bg);
      overscroll-behavior: none;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Apple Color Emoji", sans-serif;
    }

    #root {
      width: 100%;
      height: 100%;
      background-color: var(--orbit-bg);
    }
  </style>

  <script>
    document.addEventListener('error', function (e) {
      var img = e.target;
      if (img.tagName === 'IMG' && img.src && img.src.includes('dicebear.com') && img.src.includes(',')) {
        var m = img.src.match(/[?&]seed=([^&,]+)/);
        img.src = 'https://api.dicebear.com/9.x/adventurer/svg?seed=' + (m ? m[1] : 'guest');
      }
    }, true);
  </script>
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
