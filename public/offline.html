<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit 轨迹 - 离线</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #121212;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #00FFB3, #00D9FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      font-size: 16px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .hint {
      font-size: 14px;
      color: #666;
    }
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon pulse" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#00FFB3"/>
          <stop offset="100%" style="stop-color:#00D9FF"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="100" fill="#1a1a1a"/>
      <ellipse cx="256" cy="256" rx="180" ry="100" fill="none" stroke="url(#og)" stroke-width="8" transform="rotate(-20 256 256)"/>
      <circle cx="256" cy="256" r="30" fill="url(#og)"/>
    </svg>
    <h1>暂无网络连接</h1>
    <p>你的 Orbit 轨迹正在休眠中...<br>请检查网络连接后重试</p>
    <p class="hint">💡 尝试刷新页面或连接 WiFi</p>
  </div>
</body>
</html>
