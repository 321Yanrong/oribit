<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Orbit 轨迹 字体 Logo</title>
  <desc id="desc">英文 Orbit 与中文轨迹组合，圆润轻量，与同心轨迹图形呼应。</desc>

  <defs>
    <linearGradient id="brandGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#F2C4CE" />
      <stop offset="100%" stop-color="#C4E4F2" />
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="36" fill="#121212" />

  <!-- 左侧图形（极简版） -->
  <g transform="translate(86 68)">
    <circle cx="130" cy="130" r="118" fill="none" stroke="#EAEAEA" stroke-width="18" />
    <path d="M36 150 C44 82, 96 36, 160 34 C210 32, 252 56, 274 96" fill="none" stroke="url(#brandGrad)" stroke-width="18" stroke-linecap="round" />
    <path d="M268 122 C248 186, 198 230, 132 240 C88 246, 54 236, 30 214" fill="none" stroke="url(#brandGrad)" stroke-width="18" stroke-linecap="round" />
    <circle cx="118" cy="128" r="12" fill="#F2C4CE" />
    <circle cx="154" cy="144" r="10" fill="#C4E4F2" />
  </g>

  <!-- 右侧文字 -->
  <g transform="translate(430 120)">
    <!-- O 改成开放轨道感 -->
    <path d="M26 80 C32 36, 70 6, 116 8 C154 10, 186 30, 204 62" fill="none" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" />
    <path d="M198 92 C182 132, 146 160, 98 168 C60 174, 26 162, 8 140" fill="none" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" />

    <text x="230" y="138" fill="url(#brandGrad)" font-size="132" font-family="Avenir Next, Inter, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-weight="450" letter-spacing="2">rbit</text>
    <text x="8" y="254" fill="#9CA3AF" font-size="74" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-weight="500" letter-spacing="6">轨迹</text>
  </g>
</svg>
