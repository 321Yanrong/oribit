<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">同心轨迹・陪伴星轨</title>
  <desc id="desc">开放圆弧轨迹与两颗同行星点，表达陪伴、轨迹与温柔连接。</desc>

  <defs>
    <linearGradient id="track" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#F2C4CE" />
      <stop offset="100%" stop-color="#C4E4F2" />
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#d9d9d9" flood-opacity="0.4" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#121212" />

  <path
    d="M124 286 C126 198, 194 136, 276 132 C340 128, 390 158, 416 206"
    fill="none"
    stroke="url(#track)"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#soft)"
  />
  <path
    d="M408 236 C386 302, 332 350, 262 362 C202 372, 154 354, 118 322"
    fill="none"
    stroke="url(#track)"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#soft)"
  />

  <circle cx="236" cy="246" r="22" fill="#F2C4CE" />
  <circle cx="286" cy="268" r="18" fill="#C4E4F2" />

  <path
    d="M206 312 C226 330, 256 338, 286 332"
    fill="none"
    stroke="#EAEAEA"
    stroke-width="10"
    stroke-linecap="round"
  />
</svg>
